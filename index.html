<!-- RANDOM PROFIT SCRIPT -->
<script>
const names = ["Aarav","Vivaan","Aditya","Vihaan","Arjun","Sai","Reyansh","Krishna","Ishaan","Shaurya","Neha","Kiran","Pooja","Amit","Priya","Karthik","Rahul","Riya","Sneha","Ankit","Raj","Simran","Deepak","Varun","Nikhil","Meena","Rohit","Suresh","Anjali","Payal","Manish","Komal","Sonu","Tina","Vikas","Pankaj","Harsh","Divya","Yash","Aakash","Rakesh","Seema","Alok","Nisha","Tarun","Gaurav","Muskan","Ritu"];

function randomProfit(){
  return (Math.random()*5000+500).toFixed(2);
}

function renderList(){
  const box = document.getElementById("profitBox");
  box.innerHTML = "";
  for(let i=0;i<8;i++){
    let name = names[Math.floor(Math.random()*names.length)];
    let profit = randomProfit();

    box.innerHTML += `
    <div class="profit-row">
      <div class="name">✅ ${name}</div>
      <div class="amount">+₹${profit}</div>
    </div>`;
  }
}

renderList();

setInterval(renderList,3000);
</script>
